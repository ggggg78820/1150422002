<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>謝依君 — 自我介紹</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Nunito:ital,wght@0,400;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97e;
      --cream: #fdf6ec;
      --deep: #1a1108;
      --warm: #6b4c1e;
      --accent: #e05c2a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--deep);
      color: var(--cream);
      font-family: 'Noto Sans TC', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Starfield ── */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: var(--gold-light);
      animation: twinkle var(--dur, 3s) ease-in-out infinite var(--del, 0s);
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.15; transform: scale(1); }
      50%       { opacity: 0.9;  transform: scale(1.4); }
    }

    /* ── Layout ── */
    .container {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 60px 28px 80px;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      margin-bottom: 64px;
      animation: fadeDown .9s ease both;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .leo-icon {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 16px;
      display: inline-block;
      filter: drop-shadow(0 0 18px var(--gold));
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 14px var(--gold)); }
      50%       { filter: drop-shadow(0 0 30px var(--gold-light)); }
    }

    .name {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(2.6rem, 8vw, 4.2rem);
      font-weight: 700;
      letter-spacing: .06em;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 1rem;
      letter-spacing: .25em;
      color: var(--gold);
      text-transform: uppercase;
      opacity: .75;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--cream);
      opacity: .55;
      margin-top: 8px;
      letter-spacing: .12em;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 0 auto 56px;
      max-width: 420px;
    }
    .divider-line { flex: 1; height: 1px; background: var(--gold); opacity: .35; }
    .divider-gem  { font-size: 18px; }

    /* ── Cards ── */
    .cards {
      display: grid;
      gap: 24px;
    }

    .card {
      background: linear-gradient(135deg, rgba(201,168,76,.08) 0%, rgba(26,17,8,.6) 100%);
      border: 1px solid rgba(201,168,76,.22);
      border-radius: 18px;
      padding: 32px 36px;
      backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(30px);
      transition: transform .35s ease, box-shadow .35s ease;
      animation: slideUp .7s ease forwards;
    }
    .card:nth-child(1) { animation-delay: .2s; }
    .card:nth-child(2) { animation-delay: .38s; }
    .card:nth-child(3) { animation-delay: .54s; }
    .card:nth-child(4) { animation-delay: .7s; }

    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 48px rgba(201,168,76,.18);
    }

    /* gold left bar */
    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, var(--gold-light), var(--accent));
      border-radius: 18px 0 0 18px;
    }

    .card-icon  { font-size: 2rem; margin-bottom: 10px; display: block; }
    .card-label {
      font-size: .7rem;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: .7;
      margin-bottom: 6px;
    }
    .card-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--cream);
    }
    .card-sub {
      font-size: .95rem;
      color: var(--gold-light);
      opacity: .75;
      margin-top: 4px;
      font-style: italic;
    }

    /* hobby chips */
    .chips { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .chip {
      background: rgba(201,168,76,.15);
      border: 1px solid rgba(201,168,76,.35);
      border-radius: 50px;
      padding: 5px 16px;
      font-size: .85rem;
      color: var(--gold-light);
      display: flex; align-items: center; gap: 6px;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      margin-top: 64px;
      font-size: .8rem;
      letter-spacing: .15em;
      color: var(--gold);
      opacity: .4;
      animation: fadeDown 1s ease 1s both;
    }
  </style>
</head>
<body>

<!-- Starfield -->
<canvas class="stars" id="stars"></canvas>

<div class="container">

  <!-- Hero -->
  <header class="hero">
    <div class="leo-icon">♌</div>
    <h1 class="name">謝依君</h1>
    <p class="tagline">Hello, nice to meet you ✦</p>
    <p class="subtitle">這是我的個人網頁</p>
  </header>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-gem">✦</span>
    <div class="divider-line"></div>
  </div>

  <!-- Cards -->
  <div class="cards">

    <div class="card">
      <span class="card-icon">👤</span>
      <div class="card-label">姓名</div>
      <div class="card-value">謝依君</div>
    </div>

    <div class="card">
      <span class="card-icon">♌</span>
      <div class="card-label">星座</div>
      <div class="card-value">獅子座</div>
      <div class="card-sub">熱情、自信、充滿活力</div>
    </div>

    <div class="card">
      <span class="card-icon">🎉</span>
      <div class="card-label">興趣喜好</div>
      <div class="card-value">生活好朋友</div>
      <div class="chips">
        <span class="chip">🎬 看電影</span>
        <span class="chip">✈️ 旅遊</span>
        <span class="chip">🍽️ 跟朋友聚餐</span>
      </div>
    </div>

    <div class="card">
      <span class="card-icon">💊</span>
      <div class="card-label">目前職務</div>
      <div class="card-value">社區藥局 門市人員</div>
      <div class="card-sub">用微笑服務每一位顧客</div>
    </div>

  </div>

  <footer>✦ &nbsp; 很高興認識你 &nbsp; ✦</footer>
</div>

<script>
  // Generate starfield
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.4 + 0.3,
      phase: Math.random() * Math.PI * 2,
      speed: 0.3 + Math.random() * 0.8
    });
  }

  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const alpha = 0.12 + 0.55 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(232,201,126,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(ts => drawStars(ts / 1000));
  }
  drawStars(0);
</script>
</body>
</html>
